name: Publish Release Images

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Immutable release tag to publish to GHCR."
        required: true
        type: string
      git_ref:
        description: "Git ref to build (defaults to the published release tag or the triggering commit SHA)."
        required: false
        type: string
      registry_namespace:
        description: "Optional GHCR namespace override. Defaults to repo/org variable GHCR_NAMESPACE or valdrics."
        required: false
        type: string
  release:
    types: [published]

concurrency:
  group: ${{ format('{0}-{1}', github.workflow, github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.tag_name || github.sha) }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  DEFAULT_REGISTRY_NAMESPACE: "valdrics"

jobs:
  publish-release-images:
    name: Publish Digest-Pinned GHCR Images
    runs-on: ubuntu-24.04

    steps:
      - name: Resolve release publish inputs
        id: params
        env:
          INPUT_RELEASE_TAG: ${{ inputs.release_tag || '' }}
          INPUT_GIT_REF: ${{ inputs.git_ref || '' }}
          INPUT_REGISTRY_NAMESPACE: ${{ inputs.registry_namespace || '' }}
          CONFIGURED_REGISTRY_NAMESPACE: ${{ vars.GHCR_NAMESPACE || '' }}
          RELEASE_TAG_FROM_EVENT: ${{ github.event.release.tag_name || '' }}
        shell: bash
        run: |
          set -euo pipefail

          release_tag="${INPUT_RELEASE_TAG:-${RELEASE_TAG_FROM_EVENT}}"
          if [[ -z "${release_tag}" ]]; then
            echo "Release tag could not be determined." >&2
            exit 1
          fi
          case "${release_tag}" in
            *[!A-Za-z0-9._-]*)
              echo "Release tag contains unsupported characters: ${release_tag}" >&2
              exit 1
              ;;
          esac

          git_ref="${INPUT_GIT_REF:-${RELEASE_TAG_FROM_EVENT:-${GITHUB_SHA}}}"
          registry_namespace="${INPUT_REGISTRY_NAMESPACE:-${CONFIGURED_REGISTRY_NAMESPACE:-${DEFAULT_REGISTRY_NAMESPACE}}}"
          registry_namespace="$(printf '%s' "${registry_namespace}" | tr '[:upper:]' '[:lower:]')"
          if [[ -z "${registry_namespace}" ]]; then
            echo "Registry namespace must not be empty." >&2
            exit 1
          fi

          registry="ghcr.io/${registry_namespace}"
          api_repo="${registry}/valdrics-api"
          dashboard_repo="${registry}/valdrics-dashboard"
          sha_tag="sha-${GITHUB_SHA}"

          {
            echo "release_tag=${release_tag}"
            echo "git_ref=${git_ref}"
            echo "registry=${registry}"
            echo "registry_namespace=${registry_namespace}"
            echo "api_repo=${api_repo}"
            echo "dashboard_repo=${dashboard_repo}"
            echo "api_tag_ref=${api_repo}:${release_tag}"
            echo "dashboard_tag_ref=${dashboard_repo}:${release_tag}"
            echo "api_sha_ref=${api_repo}:${sha_tag}"
            echo "dashboard_sha_ref=${dashboard_repo}:${sha_tag}"
          } >> "${GITHUB_OUTPUT}"

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.params.outputs.git_ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "${GH_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

      - name: Build and publish API image
        id: build_api
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          tags: |
            ${{ steps.params.outputs.api_tag_ref }}
            ${{ steps.params.outputs.api_sha_ref }}
          cache-from: type=gha,scope=publish-release-api
          cache-to: type=gha,mode=max,scope=publish-release-api

      - name: Build and publish dashboard image
        id: build_dashboard
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./Dockerfile.dashboard
          push: true
          tags: |
            ${{ steps.params.outputs.dashboard_tag_ref }}
            ${{ steps.params.outputs.dashboard_sha_ref }}
          cache-from: type=gha,scope=publish-release-dashboard
          cache-to: type=gha,mode=max,scope=publish-release-dashboard

      - name: Record digest-pinned release metadata
        env:
          RELEASE_TAG: ${{ steps.params.outputs.release_tag }}
          GIT_REF: ${{ steps.params.outputs.git_ref }}
          REGISTRY: ${{ steps.params.outputs.registry }}
          REGISTRY_NAMESPACE: ${{ steps.params.outputs.registry_namespace }}
          API_REPOSITORY: ${{ steps.params.outputs.api_repo }}
          API_TAG_REF: ${{ steps.params.outputs.api_tag_ref }}
          API_SHA_REF: ${{ steps.params.outputs.api_sha_ref }}
          API_DIGEST: ${{ steps.build_api.outputs.digest }}
          DASHBOARD_REPOSITORY: ${{ steps.params.outputs.dashboard_repo }}
          DASHBOARD_TAG_REF: ${{ steps.params.outputs.dashboard_tag_ref }}
          DASHBOARD_SHA_REF: ${{ steps.params.outputs.dashboard_sha_ref }}
          DASHBOARD_DIGEST: ${{ steps.build_dashboard.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          python3 - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path

          release_dir = Path("release")
          api_repository = os.environ["API_REPOSITORY"]
          api_digest = os.environ["API_DIGEST"]
          dashboard_repository = os.environ["DASHBOARD_REPOSITORY"]
          dashboard_digest = os.environ["DASHBOARD_DIGEST"]

          payload = {
              "strategy": "immutable_image_promotion",
              "registry": os.environ["REGISTRY"],
              "registry_namespace": os.environ["REGISTRY_NAMESPACE"],
              "release_tag": os.environ["RELEASE_TAG"],
              "git_ref": os.environ["GIT_REF"],
              "git_sha": os.environ["GITHUB_SHA"],
              "services": {
                  "api": {
                      "repository": api_repository,
                      "tag_ref": os.environ["API_TAG_REF"],
                      "sha_ref": os.environ["API_SHA_REF"],
                      "digest": api_digest,
                      "promotion_ref": f"{api_repository}@{api_digest}",
                  },
                  "worker": {
                      "repository": api_repository,
                      "tag_ref": os.environ["API_TAG_REF"],
                      "sha_ref": os.environ["API_SHA_REF"],
                      "digest": api_digest,
                      "promotion_ref": f"{api_repository}@{api_digest}",
                      "command": [
                          "celery",
                          "-A",
                          "app.shared.core.celery_app:celery_app",
                          "worker",
                          "-l",
                          "info",
                      ],
                  },
                  "dashboard": {
                      "repository": dashboard_repository,
                      "tag_ref": os.environ["DASHBOARD_TAG_REF"],
                      "sha_ref": os.environ["DASHBOARD_SHA_REF"],
                      "digest": dashboard_digest,
                      "promotion_ref": f"{dashboard_repository}@{dashboard_digest}",
                  },
              },
          }

          (release_dir / "ghcr-release.json").write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          (release_dir / "ghcr-release.env").write_text(
              "\n".join(
                  [
                      f"RELEASE_TAG={os.environ['RELEASE_TAG']}",
                      f"GIT_REF={os.environ['GIT_REF']}",
                      f"REGISTRY={os.environ['REGISTRY']}",
                      f"API_IMAGE_DIGEST={api_digest}",
                      f"DASHBOARD_IMAGE_DIGEST={dashboard_digest}",
                      f"API_PROMOTION_REF={api_repository}@{api_digest}",
                      f"WORKER_PROMOTION_REF={api_repository}@{api_digest}",
                      f"DASHBOARD_PROMOTION_REF={dashboard_repository}@{dashboard_digest}",
                  ]
              )
              + "\n",
              encoding="utf-8",
          )
          PY
          {
            echo "## GHCR Release Images"
            echo ""
            echo "- Release tag: \`${RELEASE_TAG}\`"
            echo "- API: \`${API_REPOSITORY}@${API_DIGEST}\`"
            echo "- Worker: \`${API_REPOSITORY}@${API_DIGEST}\`"
            echo "- Dashboard: \`${DASHBOARD_REPOSITORY}@${DASHBOARD_DIGEST}\`"
            echo ""
            echo "Use \`release/ghcr-release.env\` to drive \`make deploy\` for staging or production."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload GHCR release metadata
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ghcr-release-${{ steps.params.outputs.release_tag }}
          path: release/
          retention-days: 30

      - name: Attest API image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ steps.params.outputs.api_repo }}
          subject-digest: ${{ steps.build_api.outputs.digest }}
          push-to-registry: true

      - name: Attest dashboard image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ steps.params.outputs.dashboard_repo }}
          subject-digest: ${{ steps.build_dashboard.outputs.digest }}
          push-to-registry: true
